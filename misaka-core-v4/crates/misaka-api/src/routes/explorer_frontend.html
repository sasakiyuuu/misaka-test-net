<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISAKAscan — Redirecting</title>
<style>
  body { background: #09090b; color: #fafafa; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .box { text-align: center; background: #111113; border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 12px; }
  h1 { margin-top: 0; }
  a { color: #3b82f6; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
<script>
  // Assuming the new Next.js Explorer is hosted on the same origin but at port 3000 (or default web port)
  // Adjust this URL based on actual deployment.
  const host = window.location.hostname;
  // Fallback to port 80 if not specified, or assume the new explorer is served directly
  const newUrl = "http://" + host;
  setTimeout(() => {
    window.location.href = newUrl;
  }, 3000);
</script>
</head>
<body>
  <div class="box">
    <h1>Explorer has been upgraded</h1>
    <p>We've launched a new Solscan-style Explorer.</p>
    <p>Redirecting you to the new UI...</p>
    <p><a href="#" onclick="window.location.href='http://'+window.location.hostname; return false;">Click here if you are not redirected</a></p>
  </div>
</body>
</html>
