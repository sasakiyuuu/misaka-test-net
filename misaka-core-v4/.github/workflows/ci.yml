name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'test-results/**'
      - '**.md'
      - '.gitignore'
      - '.claude/**'
      - 'scripts/pc-b-watch.ps1'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'test-results/**'
      - '**.md'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --features dag,test-utils

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit + Integration Tests
        run: cargo test --features dag,test-utils --release
      - name: Narwhal Consensus Tests
        run: cargo test -p misaka-dag --features test-utils --release
      - name: Narwhal Integration Tests
        run: cargo test -p misaka-dag --features test-utils --test narwhal_integration --release
      - name: Byzantine Fault Tests
        run: cargo test -p misaka-dag --features test-utils --test narwhal_byzantine --release
      - name: Crash Recovery Tests
        run: cargo test -p misaka-dag --features test-utils --test narwhal_crash_recovery --release
      - name: Property-Based Tests
        run: cargo test -p misaka-dag --features test-utils --test narwhal_proptest --release

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features dag,test-utils -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit

  # Grade A: No crypto stubs in production
  no-stubs:
    name: No Crypto Stubs
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: No stub signatures
        run: |
          STUBS=$(grep -rn "stub_sig\|stub_verify\|MISAKA:verify:stub\|MISAKA:stub_sig\|Ok(true).*Stub" --include="*.rs" crates/ wallet/ | grep -v "#\[cfg(test\|#\[test\|// \|test-utils\|#\[allow" || true)
          if [ -n "$STUBS" ]; then
            echo "::error::Crypto stubs found in production code:"
            echo "$STUBS"
            exit 1
          fi
      - name: No NotImplemented in production
        run: |
          NI=$(grep -rn "NotImplemented" --include="*.rs" crates/ | grep -v "test\|enum \|///\|// " || true)
          if [ -n "$NI" ]; then
            echo "::warning::NotImplemented paths found:"
            echo "$NI"
          fi
      - name: No TODO/FIXME in critical paths
        run: |
          TODOS=$(grep -rn "TODO\|FIXME" --include="*.rs" crates/misaka-consensus/src/pipeline/ crates/misaka-consensus/src/processes/ crates/misaka-dag/src/narwhal_dag/ | grep -v "test\|///\|#\[" || true)
          if [ -n "$TODOS" ]; then
            echo "::warning::TODOs in critical paths:"
            echo "$TODOS"
          fi

  # Grade A: Benchmark smoke test
  bench:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench -p misaka-dag --bench consensus_bench --features test-utils -- --quick
