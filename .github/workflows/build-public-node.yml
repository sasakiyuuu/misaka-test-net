name: build-public-node

# Public node 配布物 (misaka-node + misaka-api + config) を 3 OS でビルドし、
# タグ v* の push 時に GitHub Release + SHA256SUMS + Sigstore 署名を公開する。
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/build-public-node.yml"
      - "misaka-core-v4/**"
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least-privilege. Individual jobs override as needed.
permissions:
  contents: read

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && 'build-public-node (manual)' || (startsWith(github.ref, 'refs/tags/v') && format('release {0}', github.ref_name) || 'build-public-node') }}

jobs:
  version-check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -m1 '^version' misaka-core-v4/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag version:   $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Git tag v${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}."
            echo "::error::Update [workspace.package] version in misaka-core-v4/Cargo.toml before tagging."
            exit 1
          fi
          echo "Version check passed."

  build:
    needs: [version-check]
    if: always() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped')
    # Build jobs only need to read the repo. No write access.
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
          - runner: windows-2022
            platform: windows
            arch: x86_64
          - runner: macos-14
            platform: macos
            arch: arm64

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    defaults:
      run:
        working-directory: misaka-core-v4

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config cmake clang libclang-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm cmake
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release binaries
        run: |
          cargo build --release -p misaka-node --features dag,testnet
          cargo build --release -p misaka-api

      - name: Package public-node distribution
        shell: bash
        run: |
          python3 scripts/package_public_node.py \
            --workspace-root . \
            --binary-dir target/release \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --output-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: misaka-public-node-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            misaka-core-v4/dist/*.tar.gz
            misaka-core-v4/dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    # Needs write to publish the release, id-token to request a
    # keyless Sigstore signing certificate from Fulcio via OIDC.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        run: |
          # SEC-FIX v0.5.7: emit basenames so SHA256SUMS works against the
          # *flat* GitHub Release asset layout. Previously the file shipped
          # `./misaka-public-node-linux-x86_64/misaka-public-node-linux-x86_64.tar.gz`
          # style relative paths because `find .` traverses the staged
          # artifact subdirectories, and end users hitting
          # `sha256sum -c SHA256SUMS` got "No such file or directory" for
          # every entry.
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort | while read -r f; do
            h=$(sha256sum "$f" | awk '{print $1}')
            echo "${h}  $(basename "$f")"
          done > ../SHA256SUMS
          cat ../SHA256SUMS

      # ──  Sigstore keyless signing ──
      # Produces SHA256SUMS.sig + SHA256SUMS.pem so downloaders can verify
      # the checksums file (and thus every asset) was produced by this
      # workflow, via Sigstore Fulcio / Rekor transparency log. No signing
      # key stored anywhere — identity is the GitHub Actions OIDC token.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (Sigstore keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS
          echo "--- signature ---"
          cat SHA256SUMS.sig
          echo "--- certificate ---"
          head -c 400 SHA256SUMS.pem
          echo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem
