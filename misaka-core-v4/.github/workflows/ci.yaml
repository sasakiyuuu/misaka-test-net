name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'test-results/**'
      - '**.md'
      - '.gitignore'
      - '.claude/**'
      - 'scripts/pc-b-watch.ps1'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'test-results/**'
      - '**.md'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-pq-verifier:
    name: PQ Signature Verifier Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test ML-DSA-65 block verifier is wired
        run: |
          # Verify qdag_ct is in default features
          grep -q 'qdag_ct' crates/misaka-node/Cargo.toml || {
            echo "::error::qdag_ct missing from misaka-node features"
            exit 1
          }
          # Run DAG verifier tests with qdag-ct enabled
          cargo test -p misaka-dag --features qdag-ct,test-utils --release -- verifier
          # Run node consensus adapter tests
          cargo test -p misaka-node --features dag,qdag_ct --release -- narwhal
      - name: Verify compile_error guards work
        run: |
          # This MUST fail: release build with dag but without qdag_ct
          if cargo build -p misaka-node --release --no-default-features --features dag 2>/dev/null; then
            echo "::error::Release build without qdag_ct should fail with compile_error!"
            exit 1
          fi
          echo "compile_error! guard working correctly."

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Scan for embedded secrets
        run: |
          echo "=== Scanning for embedded secrets ==="
          PATTERNS=(
            "PRIVATE_KEY\s*="
            "SECRET_KEY\s*="
            "password\s*="
            "api_key\s*="
            "AWS_ACCESS_KEY"
            "BEGIN PRIVATE KEY"
            "sk_live_"
            "ghp_"
          )
          FOUND=0
          for p in "${PATTERNS[@]}"; do
            if grep -rn --include='*.rs' --include='*.toml' -E "$p" crates/ components/ 2>/dev/null \
               | grep -v 'test' | grep -v '// ' | grep -v 'env::var' | grep -v 'from_env' \
               | grep -v 'sanitize' | grep -v 'redact' | grep -v '_pattern' | grep -v 'PATTERNS'; then
              echo "FAIL: potential secret pattern '$p' found"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Embedded secrets detected"
            exit 1
          fi
          echo "No embedded secrets found."

      - name: Check for debug flags in defaults
        run: |
          echo "=== Checking for debug flags in default features ==="
          FORBIDDEN=("dev" "faucet" "stark-stub" "legacy-p2p" "allow-tofu")
          for feat in "${FORBIDDEN[@]}"; do
            if grep -rn "default.*=.*\[.*\"$feat\"" crates/*/Cargo.toml Cargo.toml 2>/dev/null; then
              echo "::error::Forbidden feature '$feat' in default features"
              exit 1
            fi
          done
          echo "No forbidden features in defaults."

      - name: Check for source maps
        run: |
          echo "=== Checking for source maps ==="
          if find . -name '*.map' -not -path './target/*' -not -path './.git/*' | head -1 | grep -q .; then
            echo "::error::Source map files found in repository"
            exit 1
          fi
          echo "No source maps found."

      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

  release-verify:
    name: Release Artifact Verification
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: |
          export MISAKA_BUILD_VERSION="${GITHUB_REF_NAME}"
          export MISAKA_BUILD_COMMIT="${GITHUB_SHA}"
          bash scripts/build-release.sh
      - name: Verify release artifacts
        run: |
          test -f target/release/misaka-node
          bash scripts/verify-release.sh dist/release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: dist/release/
