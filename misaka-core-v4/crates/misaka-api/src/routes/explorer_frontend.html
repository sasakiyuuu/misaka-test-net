<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISAKAscan — MSK Block Explorer</title>
<link rel="icon" type="image/svg+xml" href="/api/chain-icon.svg">
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --fg: #c9d1d9; --fg2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --border: #30363d; --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 0; }
  header .inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--fg2); font-weight: 400; font-size: 14px; margin-left: 8px; }

  /* Search */
  .search-bar { flex: 1; max-width: 600px; position: relative; }
  .search-bar input { width: 100%; padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--fg); font-size: 14px; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--fg2); }

  /* Stats cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 24px 0; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-label { font-size: 12px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .stat-value.green { color: var(--green); }

  /* Tables */
  .section { margin-bottom: 32px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { font-size: 18px; font-weight: 600; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--bg3); color: var(--fg2); }
  .badge.live { background: rgba(63,185,80,0.15); color: var(--green); }
  table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  th { text-align: left; padding: 10px 16px; font-size: 12px; color: var(--fg2); text-transform: uppercase; background: var(--bg3); font-weight: 600; }
  td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 13px; }
  tr:hover td { background: rgba(88,166,255,0.04); }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
  .hash { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
  .status-confirmed { color: var(--green); }
  .status-pending { color: var(--yellow); }
  .status-dropped { color: var(--red); }

  /* Detail panel */
  #detail { display: none; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  #detail.active { display: block; }
  #detail h3 { margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 8px; }
  .detail-label { color: var(--fg2); font-size: 13px; }
  .detail-value { font-size: 13px; word-break: break-all; }

  .loading { text-align: center; padding: 40px; color: var(--fg2); }
  @media (max-width: 768px) { .stats { grid-template-columns: 1fr 1fr; } .search-bar { max-width: 100%; } }
</style>
</head>
<body>
<header>
  <div class="container inner">
    <div class="logo"><img src="/api/chain-icon.svg" alt="MSK" width="24" height="24" style="vertical-align:middle;margin-right:6px">MISAKAscan <span>MSK Explorer</span></div>
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search by Tx Hash / Address / Block Height..." onkeydown="if(event.key==='Enter')doSearch()">
    </div>
  </div>
</header>

<div class="container">
  <!-- Stats -->
  <div class="stats" id="statsGrid">
    <div class="stat-card"><div class="stat-label">Block Height</div><div class="stat-value" id="statHeight">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Transactions</div><div class="stat-value" id="statTxs">—</div></div>
    <div class="stat-card"><div class="stat-label">Validators</div><div class="stat-value green" id="statVals">—</div></div>
    <div class="stat-card"><div class="stat-label">Chain Health</div><div class="stat-value green" id="statHealth">—</div></div>
  </div>

  <!-- Detail Panel (search results) -->
  <div id="detail"><h3 id="detailTitle"></h3><div class="detail-grid" id="detailBody"></div></div>

  <!-- Recent Blocks -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Latest Blocks</div>
      <span class="badge live">● LIVE</span>
    </div>
    <table>
      <thead><tr><th>Height</th><th>Hash</th><th>TXs</th><th>Time</th><th>Proposer</th></tr></thead>
      <tbody id="blocksBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>

  <!-- Recent Transactions -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Recent Transactions</div>
      <span class="badge live">● LIVE</span>
    </div>
    <table>
      <thead><tr><th>Hash</th><th>Block</th><th>Fee</th><th>In/Out</th><th>Status</th></tr></thead>
      <tbody id="txsBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = window.location.origin;

function short(hash, n=12) { return hash ? hash.slice(0,n) + '…' + hash.slice(-6) : '—'; }
function timeAgo(ts) {
  if (!ts) return '—';
  const d = Date.parse(ts);
  if (isNaN(d)) return '—';
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch(e) { console.error('fetch error:', url, e); return null; }
}

async function loadStats() {
  const d = await fetchJSON(API + '/api/v1/explorer/stats');
  if (!d) return;
  const s = d.status || {};
  document.getElementById('statHeight').textContent = s.highest_accepted_round ?? s.current_round ?? '—';
  document.getElementById('statTxs').textContent = s.num_commits ?? d.metrics?.commitsTotal ?? '—';
  document.getElementById('statVals').textContent = (d.peerCount != null ? d.peerCount + 1 : '—');
  const health = s.num_suspended === 0 ? 'Healthy' : s.num_suspended + ' suspended';
  document.getElementById('statHealth').textContent = d.status ? health : '—';
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadBlocks() {
  const d = await fetchJSON(API + '/api/v1/explorer/blocks?limit=15');
  if (!d) return;
  const blocks = d.blocks || d.data || [];
  if (blocks.length === 0) return;
  const tbody = document.getElementById('blocksBody');
  tbody.textContent = '';
  for (const b of blocks) {
    const height = b.height ?? b.round ?? '—';
    const tr = document.createElement('tr');
    const tdH = document.createElement('td');
    const a = document.createElement('a'); a.href = '#'; a.textContent = height;
    a.addEventListener('click', (e) => { e.preventDefault(); showBlock(height); });
    tdH.appendChild(a); tr.appendChild(tdH);
    const tdHash = document.createElement('td'); tdHash.className = 'mono';
    const sp = document.createElement('span'); sp.className = 'hash'; sp.textContent = b.hash ? short(b.hash) : '—';
    tdHash.appendChild(sp); tr.appendChild(tdHash);
    const tdTx = document.createElement('td'); tdTx.textContent = b.txCount ?? b.tx_count ?? 0; tr.appendChild(tdTx);
    const tdTime = document.createElement('td'); tdTime.textContent = b.timestamp ? timeAgo(b.timestamp) : '—'; tr.appendChild(tdTime);
    const tdProp = document.createElement('td'); tdProp.textContent = b.proposer ?? ('Validator ' + (b.author ?? 0)); tr.appendChild(tdProp);
    tbody.appendChild(tr);
  }
}

async function loadTxs() {
  const txd = await fetchJSON(API + '/api/v1/explorer/blocks?limit=5');
  if (!txd) return;
  const blocks = txd.blocks || txd.data || [];
  const txs = [];
  for (const b of blocks) {
    for (const t of (b.transactions || [])) {
      txs.push({...t, blockHeight: b.height ?? b.round});
    }
  }
  const tbody = document.getElementById('txsBody');
  tbody.textContent = '';
  if (txs.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td'); td.colSpan = 5; td.className = 'loading'; td.textContent = 'No transactions yet';
    tr.appendChild(td); tbody.appendChild(tr);
    return;
  }
  for (const t of txs.slice(0, 20)) {
    const tr = document.createElement('tr');
    const tdHash = document.createElement('td'); tdHash.className = 'mono';
    const a = document.createElement('a'); a.href = '#';
    const sp = document.createElement('span'); sp.className = 'hash'; sp.textContent = short(t.hash);
    a.appendChild(sp);
    a.addEventListener('click', (e) => { e.preventDefault(); showTx(t.hash); });
    tdHash.appendChild(a); tr.appendChild(tdHash);
    const tdBH = document.createElement('td'); tdBH.textContent = t.blockHeight ?? '—'; tr.appendChild(tdBH);
    const tdFee = document.createElement('td'); tdFee.textContent = t.fee ?? 0; tr.appendChild(tdFee);
    const tdIO = document.createElement('td'); tdIO.textContent = (t.inputCount ?? 0) + ' / ' + (t.outputCount ?? 0); tr.appendChild(tdIO);
    const tdSt = document.createElement('td');
    const stSp = document.createElement('span'); stSp.className = 'status-' + (t.status||'confirmed').toLowerCase(); stSp.textContent = t.status || 'confirmed';
    tdSt.appendChild(stSp); tr.appendChild(tdSt);
    tbody.appendChild(tr);
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const d = await fetchJSON(API + '/api/v1/explorer/search/' + encodeURIComponent(q));
  if (!d) return;
  const panel = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');

  if (d.type === 'block') {
    showBlock(d.value);
  } else if (d.type === 'transaction') {
    showTx(d.value);
  } else if (d.type === 'address') {
    showAddress(d.value);
  } else {
    title.textContent = 'Not Found';
    body.textContent = '';
    const lbl = document.createElement('div'); lbl.className = 'detail-label'; lbl.textContent = 'Query';
    const val = document.createElement('div'); val.className = 'detail-value mono'; val.textContent = q;
    body.appendChild(lbl); body.appendChild(val);
    panel.classList.add('active');
  }
}

async function showBlock(heightOrHash) {
  const d = await fetchJSON(API + '/api/v1/explorer/block/' + heightOrHash);
  if (!d) return;
  const panel = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');
  title.textContent = 'Block #' + (d.height || '?');
  body.textContent = '';
  const fields = [['Hash',d.hash||'—','mono'],['Height',d.height||'—',''],['Transactions',d.txCount||0,''],['Proposer',d.proposer||'—',''],['Timestamp',d.timestamp||'—',''],['Total Fees',d.totalFees||0,'']];
  for (const [lbl, val, cls] of fields) {
    const l = document.createElement('div'); l.className = 'detail-label'; l.textContent = lbl;
    const v = document.createElement('div'); v.className = 'detail-value' + (cls ? ' ' + cls : ''); v.textContent = val;
    body.appendChild(l); body.appendChild(v);
  }
  panel.classList.add('active');
}

async function showTx(hash) {
  const d = await fetchJSON(API + '/api/v1/tx/' + hash + '/status');
  const panel = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');
  if (!d) { title.textContent = 'TX Not Found'; body.textContent=''; panel.classList.add('active'); return; }
  title.textContent = 'Transaction';
  body.textContent = '';
  const txFields = [['Hash',d.txHash||hash,'mono'],['Status',d.status||'—','status-'+(d.status||'pending').toLowerCase()],['Block',d.blockHeight||'pending',''],['Confirmations',d.confirmations||0,''],['Fee',d.fee||0,''],['Inputs/Outputs',(d.inputCount||0)+' / '+(d.outputCount||0),'']];
  for (const [lbl, val, cls] of txFields) {
    const l = document.createElement('div'); l.className = 'detail-label'; l.textContent = lbl;
    const v = document.createElement('div'); v.className = 'detail-value' + (cls ? ' ' + cls : ''); v.textContent = val;
    body.appendChild(l); body.appendChild(v);
  }
  panel.classList.add('active');
}

async function showAddress(addr) {
  const d = await fetchJSON(API + '/api/v1/address/' + addr + '/balance');
  const panel = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');
  title.textContent = 'Address';
  const bal = d && d.balance != null ? d.balance : '—';
  body.textContent = '';
  const addrFields = [['Address',addr,'mono'],['Balance',bal + ' MSK','']];
  for (const [lbl, val, cls] of addrFields) {
    const l = document.createElement('div'); l.className = 'detail-label'; l.textContent = lbl;
    const v = document.createElement('div'); v.className = 'detail-value' + (cls ? ' ' + cls : ''); v.textContent = val;
    body.appendChild(l); body.appendChild(v);
  }
  panel.classList.add('active');
}

// Auto-refresh every 10 seconds
async function refresh() {
  await Promise.all([loadStats(), loadBlocks(), loadTxs()]);
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
